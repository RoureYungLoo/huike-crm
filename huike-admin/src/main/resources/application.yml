# 项目相关配置
huike:
  # 名称
  name: HuiKe
  # 版本
  version: 3.4.0
  # 版权年份
  copyrightYear: 2025
  # 实例演示开关
  demoEnabled: true
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  #profile: /root/soft/uploadPath
  profile: D:\imgs
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数组计算 char 字符验证
  captchaType: math
  alioss:
    endpoint: oss-cn-guangzhou.aliyuncs.com
    access-key-id: 123456789012345
    access-key-secret: 123456789012345
    bucket-name: test-bucket

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8089
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    threads:
      max: 800  # tomcat最大线程数，默认为200
      min-spare: 30  # Tomcat启动初始化的线程数，默认值25

# 日志配置
logging:
  level:
    com.huike: debug
    org.springframework: warn

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  # redis 配置
  redis:
    # 地址
    host: 192.168.100.132
    # 端口，默认为6379
    port: 6379
    # 数据库索引
    database: 1
    password: Redis123!

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 30


# MyBatis-plus配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  type-aliases-package: com.huike.**.domain
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1  # 1为默认值
      logic-not-delete-value: 0 # 0为默认值


# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  reasonable: true
  supportMethodsArguments: true
  params: count=countSql

## Miniio配置
#minio:
#  endpoint: 172.16.17.121
#  port: 9000
#  accessKey: minioadmin
#  secretKey: minioadmin
#  secure: false
#  bucketName: "huike-crm"
#  configDir: "/DATA/IMAGE/HETONG"

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice/*
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

#admin策略 导入和转换全部交由admin来处理，由admin来分配线索和规则
#rule策略 交由规则引擎来处理，项目一阶段不处理，单讲admin模式
rule:
  transfor: admin
  clue:
    import: admin
